name: Release smctl

# Build the smctl binary, package it as a tar.gz, attach to a GitHub release.
# The image build (image.yml) consumes this via github_release-style fetch.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - run: |
          mkdir -p dist
          tar -czf dist/smctl-linux-x86_64.tar.gz -C target/release smctl
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/smctl-linux-x86_64.tar.gz
