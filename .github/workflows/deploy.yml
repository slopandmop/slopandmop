name: Deploy slop

# Deploy the ollama + openclaw stack (plus its podman / nv / mount-models
# prerequisites) to a DD agent the caller owns. Triggered manually from
# the Actions tab, or by push-to-main so the fork auto-redeploys on
# content changes.
#
# Required setup — done automatically by slopandmop.com's bootstrap, or
# by hand in Settings → Secrets and variables → Actions:
#   Variable DD_AGENT_URL — e.g. https://dd-production-agent-<id>.devopsdefender.com
#   Secret   DD_PAT       — a GitHub PAT owned by the agent's DD_OWNER
#                           org/user. The agent's /deploy verifies this
#                           same way the dashboard does.

on:
  workflow_dispatch:
    inputs:
      model:
        description: Ollama model tag for openclaw (default qwen2.5:7b; try qwen2.5:0.5b on CPU-only agents)
        required: false
        default: qwen2.5:7b
      ollama_spec:
        description: Which ollama workload variant to deploy (prod = GPU, preview = CPU)
        required: false
        default: ollama/workload.prod.json
        type: choice
        options:
          - ollama/workload.prod.json
          - ollama/workload.preview.json
  push:
    branches: [main]
    paths:
      - 'podman-static/**'
      - 'podman-bootstrap/**'
      - 'nv/**'
      - 'mount-models/**'
      - 'ollama/**'
      - 'openclaw/**'
      - 'bake.sh'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read

concurrency:
  group: slopandmop-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DD_AGENT_URL: ${{ vars.DD_AGENT_URL }}
      DD_PAT: ${{ secrets.DD_PAT }}
      MODEL: ${{ inputs.model || 'qwen2.5:7b' }}
      OLLAMA_SPEC: ${{ inputs.ollama_spec || 'ollama/workload.prod.json' }}
    steps:
      - uses: actions/checkout@v4

      - name: Sanity-check config
        run: |
          : "${DD_AGENT_URL:?set repo variable DD_AGENT_URL (e.g. https://dd-production-agent-*.devopsdefender.com)}"
          : "${DD_PAT:?set repo secret DD_PAT (GitHub PAT for the agent's DD_OWNER)}"
          echo "agent: $DD_AGENT_URL"
          echo "ollama: $OLLAMA_SPEC"
          echo "model: $MODEL"

      - name: Install jq + envsubst
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq gettext-base

      - name: Probe agent
        run: |
          curl -fsS -o /dev/null -w 'agent /health → HTTP %{http_code}\n' \
            -H "Authorization: Bearer $DD_PAT" \
            "$DD_AGENT_URL/health"

      - name: Deploy slop
        run: |
          chmod +x bake.sh
          post() {
            local name="$1" body="$2"
            echo "::group::deploy $name"
            echo "$body" | jq -c '{app_name, expose}'
            curl -fsS -X POST \
              -H "Authorization: Bearer $DD_PAT" \
              -H "Content-Type: application/json" \
              --data-binary "$body" \
              "$DD_AGENT_URL/deploy" | jq -c .
            echo "::endgroup::"
          }
          post nv               "$(bash bake.sh nv/workload.json)"
          post mount-models     "$(bash bake.sh mount-models/workload.json)"
          post podman-static    "$(bash bake.sh podman-static/workload.json)"
          post podman-bootstrap "$(bash bake.sh podman-bootstrap/workload.json)"
          post ollama           "$(bash bake.sh "$OLLAMA_SPEC")"
          post "openclaw ($MODEL)" "$(MODEL="$MODEL" bash bake.sh openclaw/workload.json.tmpl)"

      - name: Summary
        run: |
          {
            echo "## Deployed to $DD_AGENT_URL"
            echo ""
            echo "| workload | status |"
            echo "|---|---|"
            for w in nv mount-models podman-static podman-bootstrap ollama openclaw; do
              echo "| $w | POSTed |"
            done
            echo ""
            echo "Dashboard: [$DD_AGENT_URL]($DD_AGENT_URL)"
          } >> "$GITHUB_STEP_SUMMARY"
